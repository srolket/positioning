<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Практика позиционирования</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="logo react">
        <div class="circle"></div>
        <div class="ellipse e1"></div>
        <div class="ellipse e2"></div>
        <div class="ellipse e3"></div>
    </div>

    <div class="logo-mickey">
    <div class="head"></div>
    <div class="ear left"></div>
    <div class="ear right"></div>
    </div>

    <button class="lightbox-btn" id="lightboxBtn">Открыть модальное окно</button>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" id="modalCloseBtn">&times;</button>
            <article class="modal-content">
                <h1>That's all, folks</h1>
                <p>You can hit <kbd>ESC</kbd> or click outside to close the modal. Give it a go to see the reverse transition.</p>
                <p>If you like this you would probably enjoy Meny, reveal.js and stroll.js.</p>
            </article>

            <div class="progress">
            <div class="bar"></div>

            <div class="text text-black">Loading...</div>
            <div class="text text-white">Loading...</div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
